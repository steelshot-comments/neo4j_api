services:
  - type: web
    name: neo4j-api
    runtime: python
    buildCommand: ""
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: NEO4J_URI
        value: <your-ngrok-or-db-uri>
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASS
        value: colored_people
      - key: NEO4J_DB
        value: idka
